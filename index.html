
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仕事に関する匿名アンケート</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      max-width: 700px;
      margin: 30px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    p {
      color: #555;
      line-height: 1.8;
      margin-bottom: 18px;
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      resize: vertical;
    }

    button {
      margin-top: 12px;
      padding: 10px 16px;
      font-size: 15px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
    }

    button:hover {
      background-color: #45a049;
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>仕事に関する匿名アンケート</h1>

    <p>
      職場をより働きやすくするためのアンケートです。<br>
      困っていること、改善してほしいこと、感じていることがあれば自由にご記入ください。<br>
      匿名なので、率直な意見を書いていただいて大丈夫です。
    </p>

    <form action="https://formsubmit.co/kn670368@gmail.com" method="POST">
      <textarea name="answer" placeholder="自由に書いてください" required></textarea>

      <input type="hidden" name="_subject" value="仕事に関する匿名アンケートの新しい回答">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_next" value="https://knm1029cat-dot.github.io/survey/">

      <button type="submit">送信</button>
    </form>

    <div class="note">
      ※氏名入力欄はありません。<br>
      ※送信内容は管理者側で確認します。
    </div>
  </div>
</body>
</html>
